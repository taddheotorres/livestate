spring.application.name=RealEstateAPI

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/real_estate_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8081

# Max sizes for handling large base64 image payloads in requests
server.tomcat.max-http-form-post-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Stripe (REQUIRED - set via env var STRIPE_SECRET_KEY)
stripe.api.key=${STRIPE_SECRET_KEY}

# JWT (REQUIRED - set via env var JWT_SECRET)
jwt.secret-key=${JWT_SECRET}

# Application base URL (for Stripe redirects, CORS, etc.)
app.base-url=${APP_BASE_URL:http://localhost:4200}
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:4200}
