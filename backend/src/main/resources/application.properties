spring.application.name=RealEstateAPI

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/real_estate_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# Server Port
server.port=8081

# Max sizes for handling large base64 image payloads in requests
server.tomcat.max-http-form-post-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Stripe (REQUIRED in production — set via env var STRIPE_SECRET_KEY)
# Dev default: placeholder, no real charges
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}

# JWT (REQUIRED in production — set via env var JWT_SECRET)
# Dev default: change this if you need real auth locally
jwt.secret-key=${JWT_SECRET:dev_secret_key_local_only_do_not_use_in_prod}

# Application base URL (for Stripe redirects, CORS, etc.)
app.base-url=${APP_BASE_URL:http://localhost:4200}
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
