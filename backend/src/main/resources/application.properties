spring.application.name=RealEstateAPI

# Database Configuration
# UseSSL=false is for local dev only. Set SPRING_DATASOURCE_USE_SSL=true in production with a proper cert.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/real_estate_db?useSSL=${SPRING_DATASOURCE_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# Server Port
server.port=8081

# Max sizes for handling large base64 image payloads in requests
server.tomcat.max-http-form-post-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Stripe (REQUIRED — set via env var STRIPE_SECRET_KEY)
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# JWT (REQUIRED — set via env var JWT_SECRET; generate with: openssl rand -base64 64)
jwt.secret-key=${JWT_SECRET}

# Application base URL (for Stripe redirects, CORS, etc.)
app.base-url=${APP_BASE_URL:http://localhost:4200}
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:4200}

# Rate limiting (login/register: 20 requests per 60s window per IP)
app.rate-limit.max-requests=${RATE_LIMIT_MAX:20}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW:60}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
