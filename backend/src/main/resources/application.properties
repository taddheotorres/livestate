spring.application.name=RealEstateAPI

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/real_estate_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8081

# Max sizes for handling large base64 image payloads in requests
server.tomcat.max-http-form-post-size=50MB
spring.servlet.multipart.max-request-size=50MB

